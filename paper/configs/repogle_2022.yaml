out_base: "../results/paper/repogle_2022"

# Figshare deposits (Replogle et al. 2022).
# 20022944: SRA/GEO file manifests (small CSVs).
# 20029387: processed h5ad datasets (raw and normalized, bulk and singlecell).
figshare_articles:
  manifests: 20022944
  h5ads: 20029387

# Files needed for the K562 essential pilot. Stable URLs and md5s come from
# the figshare API. Sizes are bytes, used as a sanity check before md5sum.
files:
  manifest_kd6:
    name: KD6_raw_files.csv
    file_id: 35773886
    url: https://ndownloader.figshare.com/files/35773886
    md5: 908ee4d31af665842240c8341ff03452
    size: 75702
  bulk_h5ad:
    name: K562_essential_raw_bulk_01.h5ad
    file_id: 35773070
    url: https://ndownloader.figshare.com/files/35773070
    md5: 8321d5d3ffc99db2a5c71edca4189735
    size: 79766954
  singlecell_h5ad:
    name: K562_essential_raw_singlecell_01.h5ad
    file_id: 35773219
    url: https://ndownloader.figshare.com/files/35773219
    md5: 4f1122ce1c7f13299a68df6459a266d3
    size: 10661879995

# Cell selection parameters. Defaults rationale documented in
# docs/repogle_2022.md.
selection:
  top_n_perturbations: 30
  n_controls: 1000
  min_cells_per_perturbation: 50
  seed: 42

# Restrict to a subset of gemgroups for pilot scale. Empty list means all 48.
# Useful values: [1, 2, 3, 4] for a four-library dev run.
# gemgroup_subset: []  # full screen, all 48 libraries
gemgroup_subset: [1, 2, 3, 4]  # 4-library dev pilot, ~6,200 cells

# Phase 2 prep: SRA accession resolution.
sra:
  bioproject: PRJNA831566
  kd_label: KD6
  source_pattern: mRNA

# Phase 3: per-perturbation pseudobulk RUVg DE.
# starsolo_base points at the workflow-side alignment output; report
# inputs are read from there.
phase3:
  starsolo_base: "../results/repogle_kd6_sc/starsolo"
  indices_base: "../results/shared"
  feature_sets: "genes genic_repeats intergenic_repeats"
  starsolo_modes: "unique multi"
  n_controls: 3000
  k_selected: 1
  min_cells_per_perturbation_col: 50

resources:
  download_mem_mb: 1000
  select_mem_mb: 8000
  resolve_sra_mem_mb: 4000
  ruv_mem_mb: 32000
