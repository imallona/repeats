base: "/home/imallona/repeats/results/simulation_chromium"

reference:
  assembly: hg38
  ensembl_release: "112"
  chromosomes: ["chr1"]
  # Split repeats into genic/intergenic subsets using gene body overlap (bedtools)
  filter_genic: true
  rmsk_source: ucsc_flatfile
  genome_fasta: "/home/imallona/repeats/results/simulation_chromium/refs/GRCh38.dna.primary_assembly.fa.gz"
  repeats_gtf: "/home/imallona/repeats/results/simulation_chromium/refs/hg38_rmsk_TE.gtf.gz"
  genes_gtf: "/home/imallona/repeats/results/simulation_chromium/refs/GRCh38.112.genes.gtf.gz"

mode: simulation

simulation:
  technology: chromium
  n_cells: 50
  n_expressed_per_cell: 80
  read_length: 90
  cb_length: 16
  umi_length: 12
  seed: 42

aligners:
  - starsolo
  - kallisto
  - alevin
  - bowtie2

aligner_params:
  starsolo:
    multimapper_modes: ["unique", "multimapping"]
    extra_args: ""
  kallisto:
    extra_args: ""
  alevin:
    extra_args: ""
  bowtie2:
    extra_args: ""
    featurecounts_cell_chunk_size: 50

resources:
  max_threads: 10
  max_mem_mb: 20000
