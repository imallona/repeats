base: "../results/gse230647_bulk"
indices_base: "../results/shared"

mode: real_data

reference:
  assembly: hg38
  ensembl_release: "112"
  chromosomes: []
  filter_genic: true
  rmsk_source: ucsc_flatfile
  genome_fasta: "../results/shared/refs/GRCh38.dna.primary_assembly.fa.gz"
  repeats_gtf: "../results/shared/refs/hg38_rmsk_TE.gtf.gz"
  genes_gtf: "../results/shared/refs/GRCh38.112.genes.gtf.gz"

real_data:
  technology: smartseq2

# GSE230647 (SRP434658). Paired-end bulk RNA-seq from iPSC-derived neural
# cultures. Two experiments: doxycycline-inducible TDP-43-HA overexpression
# (OE, DOX on vs DOX off control) and TDP-43 shRNA knockdown (KD vs NT shRNA
# control). Four replicates per condition.
# Paper: https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE230647
dataset:
  sra_study: SRP434658
  samples:
    # TDP-43 overexpression (HA-TDP43, DOX on)
    tdp43_oe_r1: SRR24314007
    tdp43_oe_r2: SRR24314008
    tdp43_oe_r3: SRR24314001
    tdp43_oe_r4: SRR24314002
    # OE control (HA-TDP43, DOX off)
    oe_ctrl_r1: SRR24314003
    oe_ctrl_r2: SRR24314017
    oe_ctrl_r3: SRR24314020
    oe_ctrl_r4: SRR24314004
    # TDP-43 shRNA knockdown
    tdp43_kd_r1: SRR24314015
    tdp43_kd_r2: SRR24314018
    tdp43_kd_r3: SRR24314021
    tdp43_kd_r4: SRR24314005
    # Non-targeting shRNA control
    nt_kd_ctrl_r1: SRR24314016
    nt_kd_ctrl_r2: SRR24314019
    nt_kd_ctrl_r3: SRR24314022
    nt_kd_ctrl_r4: SRR24314006

feature_sets:
  - repeats
  - genes
  - genic_repeats
  - intergenic_repeats

aligners:
  - star
  - kallisto
  - salmon

aligner_params:
  star:
    extra_args: ""
  kallisto:
    extra_args: ""
  salmon:
    extra_args: ""

granularities:
  - gene_id
  - family_id

resources:
  max_threads: 10
  max_mem_mb: 60000
