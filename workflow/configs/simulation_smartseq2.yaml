base: "/home/imallona/repeats/sim_smartseq2"

reference:
  assembly: hg38
  ensembl_release: "112"
  chromosomes: ["chr10"]
  # Split repeats into genic/intergenic subsets using gene body overlap (bedtools)
  filter_genic: true
  rmsk_source: ucsc_flatfile

  genome_fasta: "/home/imallona/repeats/sim_smartseq2/refs/GRCh38.dna.primary_assembly.fa.gz"
  repeats_gtf: "/home/imallona/repeats/sim_smartseq2/refs/hg38_rmsk_TE.gtf.gz"
  genes_gtf: "/home/imallona/repeats/sim_smartseq2/refs/GRCh38.112.genes.gtf.gz"

mode: simulation

simulation:
  technology: smartseq2
  n_cells: 20
  n_expressed_per_cell: 100
  read_length: 90
  seed: 42

aligners:
  - starsolo
  - kallisto
  - alevin
  - bowtie2

feature_sets:
  - repeats
  - genes

aligner_params:
  starsolo:
    multimapper_modes: ["unique"]
    extra_args: ""
  kallisto:
    extra_args: ""
  alevin:
    extra_args: ""
  bowtie2:
    extra_args: ""
    featurecounts_cell_chunk_size: 20
    featurecounts_n_feature_chunks: 1

resources:
  max_threads: 10
  max_mem_mb: 20000
