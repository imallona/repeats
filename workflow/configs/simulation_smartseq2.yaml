base: "../results/simulation_smartseq2"
indices_base: "../results/shared"

reference:
  assembly: hg38
  ensembl_release: "112"
  chromosomes: ["chr10"]
  filter_genic: true
  rmsk_source: ucsc_flatfile
  genome_fasta: "../results/shared/refs/GRCh38.dna.primary_assembly.fa.gz"
  repeats_gtf: "../results/shared/refs/hg38_rmsk_TE.gtf.gz"
  genes_gtf: "../results/shared/refs/GRCh38.112.genes.gtf.gz"

pipeline_type: simulation

simulation:
  technology: smartseq2
  n_cells: 100
  n_expressed_per_cell: 500
  read_length: 90
  seed: 42
  mutation_rate: 0.001

# Feature sets to quantify against:
#   genes              - Ensembl gene annotation
#   repeats            - full RepeatMasker annotation
#   genic_repeats      - TE loci overlapping at least one gene body
#   intergenic_repeats - TE loci with no overlap to any gene body
feature_sets:
  - repeats
  - genes
  - genic_repeats
  - intergenic_repeats

aligners:
  - starsolo
  - kallisto
  - alevin
  - bowtie2

aligner_params:
  starsolo:
    multimapper_modes: ["unique", "multi"]
    extra_args: ""
  kallisto:
    extra_args: ""
  alevin:
    extra_args: "--minAssignedFrags 1"
  bowtie2:
    multimapper_modes: ["unique", "multi"]
    extra_args: ""
    featurecounts_cell_chunk_size: 20

# Granularities to aggregate repeat counts to.
# gene_id = repeat locus; family_id / class_id aggregate across loci.
# For the genes feature_set, only gene_id is used.
granularities:
  - locus
  - gene_id
  - family_id
  - class_id

resources:
  max_threads: 10
  max_mem_mb: 20000
