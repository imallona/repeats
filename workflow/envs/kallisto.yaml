name: repeats_kallisto
channels:
  - bioconda
  - conda-forge
dependencies:
  # =0.48: kallisto>=0.50 pulls in hdf5 which requires libcurl to libnghttp2 to c-ares;
  # that chain conflicts with other packages on this system's libmamba solver.
  # 0.48 is the last pre-hdf5 release and fully supports kallisto bus.
  - bioconda::kallisto=0.48
  - bioconda::bustools
  - conda-forge::pigz
