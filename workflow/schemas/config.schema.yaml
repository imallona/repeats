$schema: "http://json-schema.org/draft-07/schema#"
description: repeats-benchmark pipeline config
type: object
required:
  - base
  - reference
  - pipeline_type
  - aligners
  - resources
additionalProperties: true
properties:

  base:
    type: string
    description: output root directory

  indices_base:
    type: string
    description: root directory for shared indices and references

  pipeline_type:
    type: string
    enum: [simulation, bulk, sc, noise_report, de_simulation]

  sc_count_mode:
    type: string
    enum: [per_featureset, gene_align_recount]
    default: per_featureset
    description: >-
      sc-only switch between native STARsolo per-feature_set counting
      (default) and one-STAR-alignment-plus-pysam-tagcount.

  reference:
    type: object
    required: [genome_fasta, repeats_gtf]
    additionalProperties: false
    properties:
      genome_fasta:
        type: string
      repeats_gtf:
        type: string
      genes_gtf:
        type: string
      chromosomes:
        type: array
        items:
          type: string
      filter_genic:
        type: boolean
        default: false
      assembly:
        type: string
        default: hg38
        description: UCSC assembly name, e.g. hg38, hg19, mm39, mm10, rn7, dm6, danRer11, ce11
      ensembl_release:
        type: string
        default: "112"
      rmsk_source:
        type: string
        enum: [ucsc_flatfile, ucsc_mysql]
        default: ucsc_flatfile
      urls:
        type: object
        additionalProperties: false
        properties:
          genome_fasta:
            type: string
          genes_gtf:
            type: string
          rmsk_flatfile:
            type: string

  simulation:
    type: object
    additionalProperties: false
    properties:
      technology:
        type: string
        enum: [smartseq2, chromium]
      n_cells:
        type: integer
        minimum: 2
      n_expressed_per_cell:
        type: integer
        minimum: 1
      read_length:
        type: integer
        minimum: 20
      cb_length:
        type: integer
        default: 16
      umi_length:
        type: integer
        default: 12
      max_repeats_per_chrom:
        type: integer
        minimum: 100
      seed:
        type: integer
        default: 42
      mutation_rate:
        type: number
        minimum: 0
        maximum: 1
        default: 0.001
        description: per-base substitution rate applied to simulated reads

  real_data:
    type: object
    additionalProperties: true
    properties:
      technology:
        type: string
        enum: [smartseq2, chromium]
      library_layout:
        type: string
        enum: [single, paired]
      chemistry:
        type: string
        enum: [10xv2, 10xv3]
      cb_length:
        type: integer
      umi_length:
        type: integer
      sc_cbumi_index:
        type: integer
      sc_cdna_index:
        type: integer
      fragment_length:
        type: integer
      fragment_sd:
        type: integer
      samples:
        type: object
        additionalProperties:
          type: object
          properties:
            R1:
              type: string
            R2:
              type: string

  dataset:
    type: object
    additionalProperties: true
    description: real-data dataset descriptor (bulk or sc). sra_study/geo_accession are optional.
    properties:
      sra_study:
        type: string
      geo_accession:
        type: string
      metadata_url:
        type: string
      sample_metadata:
        type: string
      samples:
        type: object

  feature_sets:
    type: array
    minItems: 1
    items:
      type: string
      enum: [repeats, genes, genic_repeats, intergenic_repeats, repeat_harboring_genes]
    default: [repeats]

  granularities:
    type: array
    minItems: 1
    items:
      type: string
      enum: [locus, gene_id, family_id, class_id]

  aligners:
    type: array
    minItems: 1
    items:
      type: string
      enum: [starsolo, starsolo_tagcount, kallisto, alevin, bowtie2, star, salmon]

  aligner_params:
    type: object
    additionalProperties: true
    properties:
      starsolo:
        type: object
        additionalProperties: false
        properties:
          multimapper_modes:
            type: array
            items:
              type: string
              enum: [unique, multi]
          extra_args:
            type: string
            default: ""
          sc_count:
            type: object
            additionalProperties: false
            properties:
              umi_dedup:
                type: string
                enum: [exact, 1mm_all]
                default: 1mm_all
              canonical_feature_set:
                type: string
              threads_per_recount:
                type: integer
                minimum: 1
                default: 8
      star:
        type: object
        additionalProperties: false
        properties:
          extra_args:
            type: string
            default: ""
      kallisto:
        type: object
        additionalProperties: false
        properties:
          multimapper_modes:
            type: array
            items:
              type: string
              enum: [unique, em]
          extra_args:
            type: string
            default: ""
      alevin:
        type: object
        additionalProperties: false
        properties:
          multimapper_modes:
            type: array
            items:
              type: string
              enum: [unique, noem]
          extra_args:
            type: string
            default: ""
      salmon:
        type: object
        additionalProperties: false
        properties:
          extra_args:
            type: string
            default: ""
      bowtie2:
        type: object
        additionalProperties: false
        properties:
          multimapper_modes:
            type: array
            items:
              type: string
              enum: [unique, multi]
          extra_args:
            type: string
            default: ""
          featurecounts_cell_chunk_size:
            type: integer
            minimum: 1
            default: 50
          featurecounts_n_feature_chunks:
            type: integer
            minimum: 1
            default: 1

  resources:
    type: object
    additionalProperties: false
    required: [max_threads, max_mem_mb]
    properties:
      max_threads:
        type: integer
        minimum: 1
      max_mem_mb:
        type: integer
        minimum: 1000
        description: per-rule mem_mb budget used by heavy alignment rules; not enforced unless snakemake is invoked with --resources mem_mb=N
      report_mem_mb:
        type: integer
        minimum: 1000
        description: per-rule mem_mb budget for render_report, defaults to max_mem_mb

  report:
    type: object
    additionalProperties: true
    properties:
      script:
        type: string
      conda:
        type: string
      output:
        type: string
      outdir:
        type: string
      params:
        type: array
        items:
          type: string
